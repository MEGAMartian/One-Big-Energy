<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OneBig.Energy</title>
  <meta name="description" content="Hold or Sell Decision Engine. Distilled from 30+ years and 100+ closed tax equity transactions." />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Georgia, 'Times New Roman', serif; background: #ffffff; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #f5f7fb; }
    ::-webkit-scrollbar-thumb { background: #d1d9e6; }
    input::placeholder, textarea::placeholder { color: #9ca3af; }
    input:focus, select:focus, textarea:focus { border-color: #2a5298 !important; outline: none; }
    select option { background: white; color: #111827; }
    @keyframes pulse { 0%, 100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1); } }
    @media print { .no-print { display: none !important; } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const C = {
      bg: "#ffffff", bgLight: "#f5f7fb", bgMid: "#edf0f7",
      navy: "#1a3a6b", navyLight: "#2a5298", navyAccent: "#4a7fd4",
      text: "#111827", textMid: "#374151", textLight: "#6b7280",
      border: "#d1d9e6", borderLight: "#e8edf5",
      rowAlt: "#f8f9fd", totalBg: "#eef2fb",
    };

    const SYSTEM_PROMPT = `You are the OneBig.Energy Hold or Sell Advisor — the distilled judgment of a solar tax attorney and deal maker with 30+ years of experience and 100+ closed tax equity transactions. You think like John: direct, pattern-matching, no bullshit.

Your job is to determine whether a solar developer should HOLD their projects (pursue tax equity financing), SELL their projects, or ACCUMULATE MORE before going to market.

AUTOMATIC SELL SIGNALS (any one = sell):
- Single project under 5MW total pipeline
- Multiple projects but individual size under 1MW each (15x100kW = sell, transaction costs eat the deal)
- Projects in Puerto Rico, Guam, Samoa, or other US territories
- Total pipeline under $20M implied tax equity (rough: 1MW utility ~ $1M tax equity)
- No finance team, no retained advisors, no institutional track record

GREEN LIGHT SIGNALS (need most of these to hold):
- 10x10MW+ projects with bankable offtake (TB2 hedges, investment grade PPA, community solar)
- Projects in same state or same utility territory
- $50M+ minimum implied tax equity pipeline
- Finance team on board or retained
- At least one closed institutional deal or institutional backer
- Guarantee capacity or tax credit insurance in place

MIDDLE GROUND (accumulate first):
- 5x5MW community solar same state = $25M, tight but possible
- 10x5MW same state = $50M, better
- Good projects but missing finance team or guarantee capacity

CREDIT TRANSFER MARKET REALITY:
- Under $20M: marketplaces say come back at year end
- Large established platforms accepting 85 cents after months of holding firm
- Real net on small credits: mid-80s minus 140% insurance requirement minus fees = potentially 78-82 cents
- The 140% insurance: buyer requires coverage equal to 140% of credit value against recapture. Comes out of proceeds.

COUNTERPARTY INTELLIGENCE:
- Large money center banks want $100M+ minimum, relationship builders
- Regional banks: $20-30M floor getting hard, execution risk with inexperienced teams
- Tax credit buyers: most transactional, can do one-off, price is primary variable
- Knowing someone is table stakes. Closing a deal together that went smoothly is what actually matters.
- A vouch is different from an introduction.

HOW TO CONDUCT THE CONVERSATION:
Ask one or two questions at a time. Never dump everything at once. Adapt based on answers — if they tell you they have one 2MW project, you already know the answer.
Start by asking about their pipeline: how many projects, what size, where.
Be direct. Sound like a seasoned advisor. End every conclusion with a specific next step — what should they do in the next 30 days.
Never say you are an AI. Just be the advisor.`;

    const WELCOME = `Welcome to OneBig.Energy. I'm going to help you figure out whether you should hold your projects and pursue tax equity financing, sell them, or keep building your pipeline before going to market.

Let's start simple: tell me about your projects. How many do you have, roughly what size each, and where are they located?`;

    function Nav({ page, setPage }) {
      return (
        <div style={{ width: "100%", background: C.navy, position: "sticky", top: 0, zIndex: 10, boxShadow: "0 2px 12px rgba(26,58,107,0.15)" }}>
          <div style={{ padding: "14px 40px", display: "flex", alignItems: "center", borderBottom: "1px solid rgba(255,255,255,0.08)" }}>
            <span onClick={() => setPage("bot")} style={{ fontSize: "22px", fontWeight: "700", color: "#ffffff", letterSpacing: "-0.5px", cursor: "pointer" }}>OneBig.Energy</span>
            <div style={{ marginLeft: "auto", fontSize: "11px", color: "rgba(255,255,255,0.3)", letterSpacing: "1.5px", textTransform: "uppercase" }}>To sell or not to sell. There is no question.</div>
          </div>
          <div style={{ padding: "0 40px", display: "flex" }}>
            {[["Hold or Sell","bot"],["Cut Sheet","cutsheet"],["Valuation","valuation"],["Structure Selector","structure"]].map(([label, key]) => (
              <span key={key} onClick={() => setPage(key)} style={{ padding: "10px 20px", fontSize: "11px", letterSpacing: "1.5px", textTransform: "uppercase", fontWeight: page === key ? "700" : "400", color: page === key ? "#ffffff" : "rgba(255,255,255,0.45)", borderBottom: page === key ? "2px solid #4a7fd4" : "2px solid transparent", cursor: "pointer" }}>{label}</span>
            ))}
          </div>
        </div>
      );
    }

    function BotPage() {
      const [messages, setMessages] = useState([{ role: "assistant", content: WELCOME }]);
      const [input, setInput] = useState("");
      const [loading, setLoading] = useState(false);
      const bottomRef = useRef(null);

      useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, loading]);

      async function sendMessage() {
        if (!input.trim() || loading) return;
        const userMsg = { role: "user", content: input.trim() };
        const newMessages = [...messages, userMsg];
        setMessages(newMessages);
        setInput("");
        setLoading(true);
        try {
          const response = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json", "x-api-key": "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", "anthropic-version": "2023-06-01" },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 1000,
              system: SYSTEM_PROMPT,
              messages: newMessages.map(m => ({ role: m.role, content: m.content }))
            })
          });
          const data = await response.json();
          const reply = data.content?.find(b => b.type === "text")?.text || "Something went wrong. Try again.";
          setMessages(prev => [...prev, { role: "assistant", content: reply }]);
        } catch (err) {
          setMessages(prev => [...prev, { role: "assistant", content: "Connection error. Try again." }]);
        }
        setLoading(false);
      }

      function handleKey(e) {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
      }

      return (
        <div style={{ minHeight: "calc(100vh - 89px)", background: C.bg, display: "flex", flexDirection: "column", alignItems: "center" }}>
          <div style={{ width: "100%", maxWidth: "780px", margin: "28px auto 0", padding: "0 24px" }}>
            <div style={{ background: C.bgLight, border: `1px solid ${C.border}`, borderLeft: `3px solid ${C.navyAccent}`, padding: "16px 20px", marginBottom: "8px", borderRadius: "2px" }}>
              <p style={{ margin: 0, fontSize: "13px", color: C.navyLight, lineHeight: "1.6" }}>
                HOLD OR SELL DECISION ENGINE — Distilled from 30+ years and 100+ closed tax equity transactions. Tell us about your pipeline and we'll tell you the truth.
              </p>
            </div>
          </div>
          <div style={{ width: "100%", maxWidth: "780px", flex: 1, padding: "8px 24px 0", margin: "0 auto" }}>
            {messages.map((m, i) => (
              <div key={i} style={{ marginBottom: "24px", display: "flex", flexDirection: "column", alignItems: m.role === "user" ? "flex-end" : "flex-start" }}>
                <div style={{ fontSize: "10px", letterSpacing: "2px", textTransform: "uppercase", color: m.role === "user" ? C.textLight : C.navyLight, marginBottom: "6px", fontWeight: "600" }}>
                  {m.role === "user" ? "You" : "OneBig.Energy"}
                </div>
                <div style={{ maxWidth: "88%", background: m.role === "user" ? C.bgMid : C.bgLight, border: `1px solid ${C.border}`, borderLeft: m.role === "assistant" ? `3px solid ${C.navyAccent}` : "none", borderRight: m.role === "user" ? `3px solid ${C.border}` : "none", padding: "16px 20px", color: C.text, fontSize: "15px", lineHeight: "1.75", whiteSpace: "pre-wrap", wordBreak: "break-word", borderRadius: "2px" }}>
                  {m.content}
                </div>
              </div>
            ))}
            {loading && (
              <div style={{ marginBottom: "24px" }}>
                <div style={{ fontSize: "10px", letterSpacing: "2px", color: C.navyLight, marginBottom: "6px", textTransform: "uppercase", fontWeight: "600" }}>OneBig.Energy</div>
                <div style={{ background: C.bgLight, border: `1px solid ${C.border}`, borderLeft: `3px solid ${C.navyAccent}`, padding: "16px 20px", display: "flex", gap: "6px", alignItems: "center", borderRadius: "2px" }}>
                  {[0,1,2].map(i => <div key={i} style={{ width: "7px", height: "7px", borderRadius: "50%", background: C.navyAccent, animation: "pulse 1.2s ease-in-out infinite", animationDelay: `${i * 0.2}s` }} />)}
                </div>
              </div>
            )}
            <div ref={bottomRef} />
          </div>
          <div style={{ width: "100%", maxWidth: "780px", padding: "16px 24px 32px", margin: "0 auto" }}>
            <div style={{ display: "flex", border: `1px solid ${C.border}`, background: C.bgLight, borderRadius: "2px", overflow: "hidden" }}>
              <textarea value={input} onChange={e => setInput(e.target.value)} onKeyDown={handleKey} placeholder="Describe your projects..." rows={3}
                style={{ flex: 1, background: "transparent", border: "none", outline: "none", color: C.text, fontSize: "15px", fontFamily: "Georgia, serif", padding: "16px 20px", resize: "none", lineHeight: "1.6" }} />
              <button onClick={sendMessage} disabled={loading || !input.trim()}
                style={{ background: loading || !input.trim() ? C.bgMid : C.navy, border: "none", color: loading || !input.trim() ? C.textLight : "#ffffff", padding: "0 28px", cursor: loading || !input.trim() ? "not-allowed" : "pointer", fontSize: "11px", letterSpacing: "2px", textTransform: "uppercase", fontWeight: "700", minWidth: "80px" }}>
                {loading ? "..." : "Send"}
              </button>
            </div>
            <div style={{ marginTop: "8px", fontSize: "11px", color: C.textLight, letterSpacing: "1px" }}>Enter to send · Shift+Enter for new line</div>
          </div>
        </div>
      );
    }

    const EMPTY_PROJECT = { name: "", county: "", state: "", type: "", mw: "", yield: "", ptoDate: "", utility: "", tariff: "", energyValue: "", srecEligible: "No", srecValue: "" };

    function CutSheetPage() {
      const [mode, setMode] = useState("edit");
      const [portfolio, setPortfolio] = useState({ developerName: "", portfolioName: "", territory: "", state: "", date: new Date().toLocaleDateString("en-US", { month: "long", year: "numeric" }) });
      const [projects, setProjects] = useState([{ ...EMPTY_PROJECT }, { ...EMPTY_PROJECT }]);
      const [offtake, setOfftake] = useState({ structure: "", counterparty: "", counterpartyCredit: "", term: "", startYear: "", endYear: "", priceFormula: "", notes: "" });
      const [deal, setDeal] = useState({ ask: "", epcIncluded: "", timeline: "", targetClose: "", contactName: "", contactEmail: "", contactPhone: "", additionalNotes: "" });

      const addProject = () => setProjects([...projects, { ...EMPTY_PROJECT }]);
      const removeProject = (i) => setProjects(projects.filter((_, idx) => idx !== i));
      const updateProject = (i, field, val) => { const u = [...projects]; u[i][field] = val; setProjects(u); };
      const totalMW = projects.reduce((sum, p) => sum + (parseFloat(p.mw) || 0), 0).toFixed(2);

      const inp = { background: C.bgLight, border: `1px solid ${C.border}`, color: C.text, padding: "7px 10px", fontSize: "13px", fontFamily: "Georgia, serif", width: "100%", outline: "none", borderRadius: "2px" };
      const lbl = { fontSize: "10px", letterSpacing: "1.5px", textTransform: "uppercase", color: C.navyLight, fontWeight: "600", marginBottom: "5px", display: "block" };
      const sec = { fontSize: "11px", letterSpacing: "2.5px", textTransform: "uppercase", color: C.navy, fontWeight: "700", borderBottom: `2px solid ${C.navyAccent}`, paddingBottom: "8px", marginBottom: "18px", marginTop: "32px" };

      return (
        <div style={{ minHeight: "calc(100vh - 89px)", background: C.bg }}>
          <div className="no-print" style={{ background: C.bgLight, borderBottom: `1px solid ${C.border}`, padding: "10px 40px", display: "flex", gap: "8px", justifyContent: "flex-end" }}>
            {[["Edit","edit"],["Preview","preview"]].map(([label, m]) => (
              <button key={m} onClick={() => setMode(m)} style={{ background: mode === m ? C.navy : "transparent", border: `1px solid ${C.border}`, color: mode === m ? "#ffffff" : C.navyLight, padding: "6px 18px", fontSize: "10px", letterSpacing: "1.5px", textTransform: "uppercase", fontWeight: "600", cursor: "pointer", borderRadius: "2px" }}>{label}</button>
            ))}
            <button onClick={() => window.print()} style={{ background: "transparent", border: `1px solid ${C.border}`, color: C.textLight, padding: "6px 18px", fontSize: "10px", letterSpacing: "1.5px", textTransform: "uppercase", cursor: "pointer", borderRadius: "2px" }}>Print / PDF</button>
          </div>

          {mode === "edit" ? (
            <div style={{ maxWidth: "960px", margin: "0 auto", padding: "36px 28px" }}>
              <div style={sec}>Portfolio Summary</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "16px", marginBottom: "16px" }}>
                {[["Developer / Sponsor","developerName"],["Portfolio Name","portfolioName"],["Territory / Market","territory"]].map(([label, field]) => (
                  <div key={field}><label style={lbl}>{label}</label><input style={inp} value={portfolio[field]} onChange={e => setPortfolio({ ...portfolio, [field]: e.target.value })} /></div>
                ))}
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: "16px" }}>
                {[["State(s)","state"],["Date","date"]].map(([label, field]) => (
                  <div key={field}><label style={lbl}>{label}</label><input style={inp} value={portfolio[field]} onChange={e => setPortfolio({ ...portfolio, [field]: e.target.value })} /></div>
                ))}
                <div><label style={lbl}>Total MW</label><div style={{ ...inp, color: C.navyLight, background: C.bgMid }}>{totalMW} MW</div></div>
                <div><label style={lbl}># Assets</label><div style={{ ...inp, color: C.navyLight, background: C.bgMid }}>{projects.length} assets</div></div>
              </div>

              <div style={sec}>Individual Projects</div>
              <div style={{ overflowX: "auto", border: `1px solid ${C.border}`, borderRadius: "3px" }}>
                <table style={{ width: "100%", borderCollapse: "collapse", fontSize: "12px" }}>
                  <thead>
                    <tr style={{ background: C.navy }}>
                      {["Project Name","County","ST","Type","MW","Yield kWh/kWp","PTO Date","Utility","Tariff","$/MWh","SREC?","SREC $/MWh",""].map(h => (
                        <th key={h} style={{ padding: "10px 8px", textAlign: "left", fontSize: "9px", letterSpacing: "1px", textTransform: "uppercase", color: "#9ab5e0", fontWeight: "600", whiteSpace: "nowrap" }}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {projects.map((p, i) => (
                      <tr key={i} style={{ background: i % 2 === 0 ? C.bg : C.rowAlt, borderBottom: `1px solid ${C.borderLight}` }}>
                        {[["name","160px"],["county","80px"],["state","40px"],["type","70px"],["mw","55px"],["yield","75px"],["ptoDate","90px"],["utility","90px"],["tariff","75px"],["energyValue","65px"]].map(([field, width]) => (
                          <td key={field} style={{ padding: "4px 3px" }}><input style={{ ...inp, padding: "5px 6px", width, minWidth: "36px" }} value={p[field]} onChange={e => updateProject(i, field, e.target.value)} /></td>
                        ))}
                        <td style={{ padding: "4px 3px" }}><select style={{ ...inp, padding: "5px 6px", width: "58px" }} value={p.srecEligible} onChange={e => updateProject(i, "srecEligible", e.target.value)}><option>Yes</option><option>No</option></select></td>
                        <td style={{ padding: "4px 3px" }}><input style={{ ...inp, padding: "5px 6px", width: "65px" }} value={p.srecValue} onChange={e => updateProject(i, "srecValue", e.target.value)} /></td>
                        <td style={{ padding: "4px 8px" }}><button onClick={() => removeProject(i)} style={{ background: "none", border: "none", color: C.textLight, cursor: "pointer", fontSize: "16px" }}>×</button></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              <button onClick={addProject} style={{ marginTop: "10px", background: C.bgLight, border: `1px solid ${C.border}`, color: C.navyLight, padding: "7px 18px", fontSize: "10px", letterSpacing: "1.5px", textTransform: "uppercase", fontWeight: "600", cursor: "pointer", borderRadius: "2px" }}>+ Add Project</button>

              <div style={sec}>Offtake & Revenue</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "16px", marginBottom: "16px" }}>
                {[["Offtake Structure","structure",["PPA — Fixed Price","PPA — Escalating","Community Solar","Merchant","TB2 Hedge","Net Metering","Other"]],["Counterparty","counterparty",null],["Counterparty Credit","counterpartyCredit",["Investment Grade","Sub-Investment Grade","Municipal / Government","Unrated","Unknown"]]].map(([label, field, options]) => (
                  <div key={field}><label style={lbl}>{label}</label>
                    {options ? <select style={inp} value={offtake[field]} onChange={e => setOfftake({ ...offtake, [field]: e.target.value })}><option value="">Select...</option>{options.map(o => <option key={o}>{o}</option>)}</select>
                      : <input style={inp} value={offtake[field]} onChange={e => setOfftake({ ...offtake, [field]: e.target.value })} />}
                  </div>
                ))}
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: "16px", marginBottom: "16px" }}>
                {[["Contract Term (yrs)","term"],["Start Year","startYear"],["End Year","endYear"],["Price / Formula","priceFormula"]].map(([label, field]) => (
                  <div key={field}><label style={lbl}>{label}</label><input style={inp} value={offtake[field]} onChange={e => setOfftake({ ...offtake, [field]: e.target.value })} /></div>
                ))}
              </div>
              <div><label style={lbl}>Offtake Notes</label><textarea style={{ ...inp, resize: "vertical", minHeight: "64px" }} value={offtake.notes} onChange={e => setOfftake({ ...offtake, notes: e.target.value })} /></div>

              <div style={sec}>Deal Structure & Ask</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "16px", marginBottom: "16px" }}>
                <div><label style={lbl}>What Are You Seeking?</label>
                  <select style={inp} value={deal.ask} onChange={e => setDeal({ ...deal, ask: e.target.value })}>
                    <option value="">Select...</option>
                    {["Sell Project(s) Outright","Sell Tax Credits Only","Tax Equity Partnership","Tax Equity + Construction Debt","Sale-Leaseback","Inverted Lease","Open to Structure"].map(o => <option key={o}>{o}</option>)}
                  </select>
                </div>
                <div><label style={lbl}>EPC Included in Sale?</label>
                  <select style={inp} value={deal.epcIncluded} onChange={e => setDeal({ ...deal, epcIncluded: e.target.value })}>
                    <option value="">Select...</option>
                    {["Yes — Turnkey including EPC","No — Buyer sources own EPC","Negotiable","Project already operating"].map(o => <option key={o}>{o}</option>)}
                  </select>
                </div>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "16px", marginBottom: "16px" }}>
                <div><label style={lbl}>Development Stage</label>
                  <select style={inp} value={deal.timeline} onChange={e => setDeal({ ...deal, timeline: e.target.value })}>
                    <option value="">Select...</option>
                    {["Operating","Construction","NTP Ready","Permitted — Pre-NTP","Late Development","Early Development","Mixed Portfolio"].map(o => <option key={o}>{o}</option>)}
                  </select>
                </div>
                <div><label style={lbl}>Target Close / COD</label><input style={inp} placeholder="e.g. Q3 2025" value={deal.targetClose} onChange={e => setDeal({ ...deal, targetClose: e.target.value })} /></div>
              </div>
              <div><label style={lbl}>Additional Notes</label>
                <textarea style={{ ...inp, resize: "vertical", minHeight: "80px" }} value={deal.additionalNotes} onChange={e => setDeal({ ...deal, additionalNotes: e.target.value })} />
              </div>

              <div style={sec}>Contact</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "16px" }}>
                {[["Name","contactName"],["Email","contactEmail"],["Phone","contactPhone"]].map(([label, field]) => (
                  <div key={field}><label style={lbl}>{label}</label><input style={inp} value={deal[field]} onChange={e => setDeal({ ...deal, [field]: e.target.value })} /></div>
                ))}
              </div>
              <div style={{ marginTop: "40px", padding: "16px 20px", background: C.bgLight, border: `1px solid ${C.border}`, borderLeft: `3px solid ${C.navyAccent}`, borderRadius: "2px" }}>
                <p style={{ margin: 0, fontSize: "12px", color: C.navyLight }}>Switch to Preview to see the formatted cut sheet. Use Print / PDF to export.</p>
              </div>
            </div>

          ) : (
            <div style={{ maxWidth: "960px", margin: "0 auto", padding: "48px 52px", color: C.text }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "28px", borderBottom: `3px solid ${C.navy}`, paddingBottom: "20px" }}>
                <div>
                  <div style={{ fontSize: "26px", fontWeight: "700", color: C.navy, letterSpacing: "-0.5px", marginBottom: "6px" }}>{portfolio.portfolioName || "Portfolio Name"}</div>
                  <div style={{ fontSize: "14px", color: C.navyLight }}>{[`${totalMW} MW`, `${projects.length} assets`, portfolio.territory, portfolio.state].filter(Boolean).join("  ·  ")}</div>
                  {portfolio.developerName && <div style={{ fontSize: "13px", color: C.textMid, marginTop: "4px" }}>{portfolio.developerName}</div>}
                </div>
                <div style={{ textAlign: "right" }}>
                  <div style={{ fontSize: "10px", color: C.textLight, letterSpacing: "2px", textTransform: "uppercase", marginBottom: "4px" }}>Confidential</div>
                  <div style={{ fontSize: "11px", color: C.textLight }}>{portfolio.date}</div>
                </div>
              </div>

              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: "12px", marginBottom: "28px", border: `1px solid ${C.border}` }}>
                <thead>
                  <tr style={{ background: C.navy }}>
                    {["Project Name","County","ST","Type","MW","Yield","PTO Date","Utility","Tariff","$/MWh","SREC","SREC $/MWh"].map(h => (
                      <th key={h} style={{ padding: "10px", textAlign: "left", fontSize: "9px", letterSpacing: "1px", textTransform: "uppercase", color: "#9ab5e0", fontWeight: "600", whiteSpace: "nowrap" }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {projects.map((p, i) => (
                    <tr key={i} style={{ background: i % 2 === 0 ? C.bg : C.rowAlt, borderBottom: `1px solid ${C.borderLight}` }}>
                      {[p.name||"—",p.county||"—",p.state||"—",p.type||"—",p.mw||"—",p.yield||"—",p.ptoDate||"—",p.utility||"—",p.tariff||"—",p.energyValue?`$${p.energyValue}`:"—",p.srecEligible,p.srecValue?`$${p.srecValue}`:"—"].map((val, j) => (
                        <td key={j} style={{ padding: "9px 10px", color: C.textMid, fontSize: "12px" }}>{val}</td>
                      ))}
                    </tr>
                  ))}
                  <tr style={{ background: C.totalBg, borderTop: `2px solid ${C.navyAccent}` }}>
                    <td style={{ padding: "9px 10px", fontWeight: "700", color: C.navy, fontSize: "12px" }}>TOTAL</td>
                    <td colSpan={3} />
                    <td style={{ padding: "9px 10px", fontWeight: "700", color: C.navy, fontSize: "12px" }}>{totalMW} MW</td>
                    <td colSpan={7} />
                  </tr>
                </tbody>
              </table>

              {(offtake.structure || offtake.counterparty || offtake.notes) && (
                <div style={{ background: C.bgLight, border: `1px solid ${C.border}`, borderLeft: `3px solid ${C.navyAccent}`, padding: "16px 20px", marginBottom: "16px", borderRadius: "2px" }}>
                  <div style={{ fontSize: "10px", letterSpacing: "2px", textTransform: "uppercase", color: C.navy, fontWeight: "700", marginBottom: "10px" }}>Offtake</div>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: "12px", fontSize: "12px" }}>
                    {[["Structure",offtake.structure],["Counterparty",offtake.counterparty],["Credit",offtake.counterpartyCredit],["Term",offtake.startYear&&offtake.endYear?`${offtake.startYear}–${offtake.endYear}`:""],["Price",offtake.priceFormula]].filter(([,v])=>v).map(([label,val])=>(
                      <div key={label}><span style={{ color: C.textLight, fontSize: "10px", display: "block", marginBottom: "2px", textTransform: "uppercase" }}>{label}</span><span style={{ color: C.text }}>{val}</span></div>
                    ))}
                  </div>
                  {offtake.notes && <div style={{ marginTop: "12px", fontSize: "12px", color: C.textMid, lineHeight: "1.6", borderTop: `1px solid ${C.borderLight}`, paddingTop: "10px" }}>{offtake.notes}</div>}
                </div>
              )}

              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "16px", marginBottom: "16px" }}>
                <div style={{ background: C.bgLight, border: `1px solid ${C.border}`, padding: "16px 20px", borderRadius: "2px" }}>
                  <div style={{ fontSize: "10px", letterSpacing: "2px", textTransform: "uppercase", color: C.navy, fontWeight: "700", marginBottom: "12px" }}>Deal Structure</div>
                  {[["Seeking",deal.ask],["EPC",deal.epcIncluded],["Stage",deal.timeline],["Target Close",deal.targetClose]].filter(([,v])=>v).map(([label,val])=>(
                    <div key={label} style={{ marginBottom: "7px", fontSize: "13px" }}>
                      <span style={{ color: C.textLight, fontSize: "10px", textTransform: "uppercase", letterSpacing: "1px", marginRight: "8px" }}>{label}</span>
                      <span style={{ color: C.text }}>{val}</span>
                    </div>
                  ))}
                </div>
                <div style={{ background: C.bgLight, border: `1px solid ${C.border}`, padding: "16px 20px", borderRadius: "2px" }}>
                  <div style={{ fontSize: "10px", letterSpacing: "2px", textTransform: "uppercase", color: C.navy, fontWeight: "700", marginBottom: "12px" }}>Contact</div>
                  {deal.contactName && <div style={{ fontSize: "15px", fontWeight: "700", color: C.navy, marginBottom: "5px" }}>{deal.contactName}</div>}
                  {deal.contactEmail && <div style={{ fontSize: "13px", color: C.navyLight, marginBottom: "3px" }}>{deal.contactEmail}</div>}
                  {deal.contactPhone && <div style={{ fontSize: "13px", color: C.textMid }}>{deal.contactPhone}</div>}
                </div>
              </div>

              {deal.additionalNotes && (
                <div style={{ background: C.bgLight, border: `1px solid ${C.border}`, padding: "16px 20px", marginBottom: "16px", borderRadius: "2px" }}>
                  <div style={{ fontSize: "10px", letterSpacing: "2px", textTransform: "uppercase", color: C.navy, fontWeight: "700", marginBottom: "8px" }}>Notes</div>
                  <div style={{ fontSize: "12px", color: C.textMid, lineHeight: "1.7" }}>{deal.additionalNotes}</div>
                </div>
              )}

              <div style={{ marginTop: "40px", paddingTop: "16px", borderTop: `1px solid ${C.border}`, display: "flex", justifyContent: "space-between", fontSize: "10px", color: C.textLight, letterSpacing: "1px", textTransform: "uppercase" }}>
                <span>Confidential — For Discussion Purposes Only</span>
                <span style={{ color: C.navyAccent }}>onebig.energy</span>
              </div>
            </div>
          )}
        </div>
      );
    }

    function ComingSoon({ title }) {
      return (
        <div style={{ minHeight: "calc(100vh - 89px)", display: "flex", alignItems: "center", justifyContent: "center" }}>
          <div style={{ textAlign: "center", padding: "60px 40px" }}>
            <div style={{ fontSize: "13px", letterSpacing: "3px", textTransform: "uppercase", color: C.navyAccent, marginBottom: "16px" }}>Coming Soon</div>
            <div style={{ fontSize: "32px", fontWeight: "700", color: C.navy, marginBottom: "12px" }}>{title}</div>
            <div style={{ fontSize: "15px", color: C.textLight, maxWidth: "400px", lineHeight: "1.7" }}>This tool is under development. Start with the Hold or Sell advisor while we build this out.</div>
          </div>
        </div>
      );
    }

    function App() {
      const [page, setPage] = useState("bot");
      return (
        <div>
          <Nav page={page} setPage={setPage} />
          {page === "bot" && <BotPage />}
          {page === "cutsheet" && <CutSheetPage />}
          {page === "valuation" && <ComingSoon title="Valuation" />}
          {page === "structure" && <ComingSoon title="Structure Selector" />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
